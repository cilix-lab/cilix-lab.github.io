<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 380 108"
  role="img"
  aria-label="Poldermate">

  <title>Poldermate</title>

  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300&family=DM+Serif+Display&display=swap');
    ]]></style>
  </defs>

  <text x="20" y="62" fill="#5B7A40" font-size="52">
    <tspan
      font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
      font-weight="300"
      letter-spacing="4">polder</tspan><tspan
      font-family="'DM Serif Display', Georgia, serif"
      font-weight="400"
      dx="-4">mate</tspan>
  </text>

  <text
    x="360"
    y="90"
    text-anchor="end"
    fill="#5B7A40"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="30"
    letter-spacing="2">.nl</text>

</svg>